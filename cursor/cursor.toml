[font]
normal = { family = "Iosevka", style = "Regular" }
bold = { family = "Iosevka", style = "Bold" }
italic = { family = "Iosevka", style = "Italic" }
size = 12.0

[font.glyph_offset]
x = 0
y = 0

[font.offset]
x = 0
y = 0

# リガチャを有効にする
[font.features]
"Iosevka" = ["+calt", "+liga", "+dlig"]

# 日本語フォントの設定
[font.builtin_box_drawing]
scale = 1.0

[font.offset]
x = 0
y = 0

# Miguフォントを日本語に使用
[font.maps]
"Migu 1M" = [
    { family = "Migu 1M", start = 0x3000, end = 0x30FF },
    { family = "Migu 1M", start = 0xFF00, end = 0xFFEF },
    { family = "Migu 1M", start = 0x4E00, end = 0x9FFF }
]

